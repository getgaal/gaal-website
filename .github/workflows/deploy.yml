name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight deploy at a time; cancel queued ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build
        env:
          # Vite/router base path. actions/configure-pages emits the right value
          # for project pages (/<repo>) or custom-domain (/) deploys.
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Copy SPA fallback to 404.html
        run: |
          if [ -f dist/client/_shell.html ]; then
            cp dist/client/_shell.html dist/client/404.html
          elif [ -f dist/client/index.html ]; then
            cp dist/client/index.html dist/client/404.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
